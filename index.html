  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // PWA service worker — offline shell only. Registered in production builds
      // (PROD) so the dev server's HMR/module graph is never intercepted. Pure
      // browser API; no bundler/node globals referenced.
      if ("serviceWorker" in navigator && location.hostname !== "localhost" && location.hostname !== "127.0.0.1") {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("/sw.js").catch(function () {
            /* registration failure is non-fatal — app runs without offline shell */
          });
        });
      }
    </script>
  </body>
</html>
