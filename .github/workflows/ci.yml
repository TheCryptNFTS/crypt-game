name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# The engine is a deterministic pure reducer, so CI is fully reproducible:
# the same seeds produce byte-identical states. One job, npm cached.
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      # The existing proof scripts that form the engine gate. Each exits non-zero
      # on failure, so any regression fails the job.
      - name: Determinism proof
        run: npm run dev:determinism

      - name: Legality proof
        run: npm run dev:legality

      - name: Regression suite
        run: npm run dev:regression

      - name: Behavioral coverage
        run: npm run dev:behavioral-coverage

      - name: Unit tests (vitest)
        run: npx vitest run
